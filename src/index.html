<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereoscopic 180 SBS LoRA Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0e12;
      --bg-raised: #13161c;
      --bg-card: #181c24;
      --bg-input: #1e222c;
      --border: #262b36;
      --border-hover: #363d4d;
      --text: #e4e8f0;
      --text-dim: #8891a4;
      --text-muted: #5c6478;
      --accent: #4ecdc4;
      --accent-dim: rgba(78, 205, 196, 0.12);
      --accent-glow: rgba(78, 205, 196, 0.25);
      --video-color: #f78166;
      --image-color: #a78bfa;
      --success: #4ecdc4;
      --warn: #f0c674;
      --danger: #f87171;
      --radius: 8px;
      --radius-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-app-region: drag;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Title bar ── */
    .titlebar {
      height: 52px;
      padding: 0 20px 0 80px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    .titlebar-icon {
      width: 32px; height: 32px;
      background: var(--accent-dim);
      border: 1px solid rgba(78,205,196,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .titlebar h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .titlebar-sub { font-size: 11px; color: var(--text-muted); margin-left: auto; }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      -webkit-app-region: no-drag;
    }

    /* ── Dependency Check ── */
    .dep-check {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
    }
    .dep-check.ok { border-color: rgba(78,205,196,0.3); }
    .dep-check.error { border-color: rgba(248,113,113,0.3); }
    .dep-status {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 500;
    }
    .dep-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted);
    }
    .dep-dot.ok { background: var(--success); }
    .dep-dot.error { background: var(--danger); }
    .dep-dot.checking {
      background: var(--warn);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .dep-details {
      margin-top: 12px; padding: 12px;
      background: var(--bg-input); border-radius: var(--radius);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--text-dim);
      line-height: 1.8; white-space: pre-wrap;
    }
    .dep-actions {
      margin-top: 12px;
      display: flex; gap: 8px;
    }

    /* ── Drop Zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 24px;
      text-align: center;
      transition: all 0.2s;
      background: var(--bg-raised);
    }
    .drop-zone.dragging {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .drop-zone-icon {
      color: var(--accent); opacity: 0.6;
      margin-bottom: 14px;
    }
    .drop-zone-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .drop-zone-sub {
      font-size: 12px; color: var(--text-muted); line-height: 1.6;
      margin-bottom: 20px;
    }
    .drop-zone-buttons {
      display: flex; gap: 10px; justify-content: center;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      -webkit-app-region: no-drag;
    }
    .btn-secondary { background: var(--bg-input); color: var(--text); }
    .btn-secondary:hover { border-color: var(--border-hover); background: var(--bg-card); }
    .btn-primary { background: var(--accent); color: #0c0e12; border-color: var(--accent); font-weight: 600; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-danger { background: transparent; color: var(--danger); border-color: rgba(248,113,113,0.3); }
    .btn-danger:hover { background: rgba(248,113,113,0.08); }
    .btn-text {
      background: none; border: none; color: var(--text-muted);
      font-family: inherit; font-size: 12px; cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .btn-text:hover { color: var(--danger); }

    /* ── File List ── */
    .file-list { margin-top: 16px; }
    .file-list-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .file-list-stats { display: flex; gap: 6px; flex-wrap: wrap; }
    .stat-chip {
      font-size: 11px; font-weight: 500;
      padding: 3px 8px; border-radius: 20px;
      background: var(--bg-input); color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .stat-chip.video { color: var(--video-color); border-color: rgba(247,129,102,0.25); }
    .stat-chip.image { color: var(--image-color); border-color: rgba(167,139,250,0.25); }
    .file-list-items {
      max-height: 180px; overflow-y: auto;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-raised);
    }
    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .file-item:last-child { border-bottom: none; }
    .file-icon { display: flex; opacity: 0.6; }
    .file-icon.video { color: var(--video-color); }
    .file-icon.image { color: var(--image-color); }
    .file-name {
      flex: 1; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-path {
      color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
      font-size: 10px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; max-width: 300px;
    }
    .file-size { color: var(--text-muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
    .file-remove {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 2px; display: flex; border-radius: 4px;
      -webkit-app-region: no-drag;
    }
    .file-remove:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

    /* ── Config ── */
    .config-panel {
      margin-top: 20px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .config-title {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); margin-bottom: 16px;
    }
    .config-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .config-group label {
      display: block; font-size: 13px; font-weight: 500; margin-bottom: 7px;
    }
    .label-hint { color: var(--text-muted); font-weight: 400; font-size: 11px; }
    .radio-group { display: flex; gap: 5px; flex-wrap: wrap; }
    .radio-btn {
      padding: 5px 11px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-input); color: var(--text-dim);
      font-family: inherit; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      -webkit-app-region: no-drag;
    }
    .radio-btn:hover { border-color: var(--border-hover); }
    .radio-btn.active {
      background: var(--accent-dim); color: var(--accent);
      border-color: rgba(78,205,196,0.3);
    }
    .input-row { display: flex; align-items: center; gap: 10px; }
    .input-row input[type="range"] {
      flex: 1; accent-color: var(--accent);
      -webkit-app-region: no-drag;
    }
    .input-row.dual { flex-wrap: wrap; }
    .input-row.dual input[type="range"] { flex: 1; min-width: 60px; }
    .range-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 500; color: var(--accent);
      min-width: 36px; text-align: right;
    }
    .range-label { font-size: 11px; color: var(--text-muted); }
    .num-input {
      width: 100px; padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg-input); color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      -webkit-app-region: no-drag;
    }
    .num-input:focus { outline: none; border-color: var(--accent); }
    .slider-num-input { width: 82px; text-align: right; }

    /* ── Output Dir ── */
    .output-dir-row {
      margin-top: 20px;
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .output-dir-label {
      font-size: 12px; font-weight: 600; color: var(--text-dim);
      white-space: nowrap;
    }
    .output-dir-path {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--accent);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Estimate ── */
    .estimate-bar {
      margin-top: 16px; padding: 14px 20px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .estimate-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .estimate-stats { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .est-item { text-align: center; }
    .est-num {
      display: block; font-size: 20px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; color: var(--text);
    }
    .est-label { font-size: 11px; color: var(--text-muted); }
    .est-sep { color: var(--text-muted); font-size: 16px; }
    .est-item.highlight .est-num { color: var(--accent); }
    .estimate-warn {
      margin-top: 10px; font-size: 12px; color: var(--warn);
      padding: 8px 12px; background: rgba(240,198,116,0.08);
      border-radius: 6px; border: 1px solid rgba(240,198,116,0.15);
    }

    /* ── Action Bar ── */
    .action-bar {
      margin-top: 24px; padding-bottom: 24px;
      display: flex; justify-content: flex-end; align-items: center; gap: 12px;
    }

    /* ── Processing ── */
    .processing-view { padding-top: 8px; }
    .proc-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }
    .proc-header h2 { font-size: 17px; }
    .proc-file { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
    .proc-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-track {
      height: 6px; background: var(--bg-input);
      border-radius: 3px; overflow: hidden; margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; transition: width 0.3s ease;
    }
    @keyframes loadingPulse {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.25; }
    }
    .progress-fill.loading-pulse {
      animation: loadingPulse 2s ease-in-out infinite;
    }

    .log-window {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      height: calc(100vh - 280px);
      min-height: 200px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; line-height: 1.7;
    }
    .log-line { color: var(--text-dim); padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .log-line.success { color: var(--success); }
    .log-line.error { color: var(--danger); }
    .log-line.info { color: var(--accent); }

    .proc-actions {
      margin-top: 16px; display: flex; gap: 10px; justify-content: flex-end;
    }

    /* ── Complete ── */
    .complete-view { text-align: center; padding-top: 40px; }
    .complete-icon {
      width: 56px; height: 56px;
      background: var(--accent-dim); color: var(--accent);
      border-radius: 50%; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(78,205,196,0.3);
    }
    .complete-view h2 { font-size: 20px; margin-bottom: 24px; }
    .results-grid {
      display: flex; gap: 14px; justify-content: center;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .result-card {
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 24px; min-width: 130px;
    }
    .result-num {
      display: block; font-size: 26px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; color: var(--accent);
    }
    .result-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    .output-structure {
      text-align: left; max-width: 480px; margin: 0 auto 24px;
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
    }
    .output-structure h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .tree {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--text-dim); line-height: 1.7;
      white-space: pre;
    }
    .complete-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

    /* ── Review View ── */
    .review-view {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 52px - 48px);
      position: relative;
    }
    .review-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .review-toolbar .btn-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .review-toolbar .btn-back:hover { border-color: var(--border-hover); color: var(--text); }
    .review-stats {
      font-size: 13px;
      color: var(--text-dim);
      margin-right: auto;
    }
    .review-stats strong { color: var(--text); }
    .review-toolbar .btn-sm {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }
    .review-toolbar .btn-sm:hover { border-color: var(--border-hover); color: var(--text); }

    .review-grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
    }
    .review-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
    .review-cell {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, transform 0.15s;
    }
    .review-cell:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .review-cell.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow);
    }
    .review-cell .thumb-wrapper {
      width: 100%;
      height: 100px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .review-cell .thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .review-cell .thumb-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(110deg, var(--bg-input) 30%, var(--bg-card) 50%, var(--bg-input) 70%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .review-cell .cell-info {
      padding: 6px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .review-cell .frame-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .review-cell .pair-badge {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .review-cell .check-overlay {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.15s, transform 0.15s;
    }
    .review-cell.selected .check-overlay { opacity: 1; transform: scale(1); }

    .review-selection-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    .review-selection-bar .sel-info {
      font-size: 13px;
      color: var(--text);
      margin-right: auto;
    }
    .review-selection-bar .sel-info strong { color: var(--accent); }
    .btn-danger {
      background: var(--danger) !important;
      color: #fff !important;
      border: none !important;
    }
    .btn-danger:hover { filter: brightness(0.9); }

    .review-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .review-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 420px;
      width: 90%;
    }
    .review-modal h3 { font-size: 16px; margin-bottom: 12px; }
    .review-modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
    .review-modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .review-toast {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      z-index: 20;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .review-loading-banner {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Source List View ── */
    .source-list-view {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 52px - 48px);
      position: relative;
    }
    .source-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .source-search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
    }
    .source-search {
      width: 100%;
      padding: 6px 10px 6px 30px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      -webkit-app-region: no-drag;
    }
    .source-search:focus { outline: none; border-color: var(--accent); }
    .source-search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .source-sort-wrap {
      display: flex;
      align-items: center;
      gap: 6px;

      folderOpen: () => svgIcon('<path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1"/><path d="M3 17l2.2-6.6A1 1 0 0 1 6.1 10H21a1 1 0 0 1 .9 1.4L19.5 17a2 2 0 0 1-1.8 1.2H5z"/>', 16),

    // ── Render ──
    function render() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      // Titlebar
      const titlebar = h("div", { className: "titlebar" },
        h("div", { className: "titlebar-icon" }, ICONS.sphere()),
        h("h1", {}, "Stereoscopic 180 SBS LoRA Trainer"),
        h("span", { className: "titlebar-sub" }, "Light Sail VR"),
      );
      app.appendChild(titlebar);

      const content = h("div", { className: "content" });

      if (state.view === "setup") renderSetup(content);
      else if (state.view === "processing") renderProcessing(content);
      else if (state.view === "complete") renderComplete(content);
      else if (state.view === "review-sources") renderReviewSources(content);
      else if (state.view === "review") renderReview(content);
      else if (state.view === "train") renderTrain(content);

      app.appendChild(content);
    }

    function renderSetup(container) {
      if (!state.depthProbeRequested) {
        state.depthProbeRequested = true;
        if (window.api.checkDepthBackend) {
          window.api.checkDepthBackend().then((info) => {
            state.depthBackendProbe = info;
            if (state.view === "setup") render();
          });
        }
      }

      // Dependency check
      const depClass = state.depStatus === "ok" ? "ok" : state.depStatus === "error" ? "error" : "";
      const depCheck = h("div", { className: `dep-check ${depClass}` });

      const dotClass = state.depStatus === "checking" ? "checking" : state.depStatus === "ok" ? "ok" : "error";
      const statusText = state.depStatus === "checking" ? "Checking dependencies..."
        : state.depStatus === "ok" ? "All dependencies found — ready to generate"
        : "Missing dependencies";

      depCheck.appendChild(h("div", { className: "dep-status" },
        h("span", { className: `dep-dot ${dotClass}` }),
        h("span", {}, statusText),
      ));

      if (state.depStatus === "error" && state.depError) {
        let instructions = "";
        if (state.depError === "python3_not_found") {
          instructions = "Python 3 was not found on your system.\n\nInstall via Homebrew:\n  brew install python@3.11\n\nOr download from python.org";
        } else if (state.depError === "ffmpeg_not_found") {
          instructions = "ffmpeg was not found on your system.\n\nInstall via Homebrew:\n  brew install ffmpeg";
        } else if (state.depError === "packages_missing") {
          instructions = "Required Python packages are missing.\n\nInstall them with:\n  pip3 install opencv-python-headless numpy Pillow";
        }
        depCheck.appendChild(h("div", { className: "dep-details" }, instructions));
        depCheck.appendChild(h("div", { className: "dep-actions" },
          h("button", { className: "btn btn-secondary", onClick: checkDeps }, "Re-check"),
        ));
      }

      container.appendChild(depCheck);

      // Drop zone
      const dropZone = h("div", { className: "drop-zone" });
      dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragging"); });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragging"));
      dropZone.addEventListener("drop", async (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragging");
        // Electron drop gives us file paths
        const paths = [...e.dataTransfer.files].map(f => f.path).filter(Boolean);
        if (paths.length > 0) {
          // For now just show we got them — real path handling is in main process
          // We'll use the dialog-based approach as primary
        }
      });

      dropZone.appendChild(h("div", { className: "drop-zone-icon" }, ICONS.sphere()));
      dropZone.appendChild(h("p", { className: "drop-zone-title" }, "Select files or a folder to get started"));

      const subP = h("p", { className: "drop-zone-sub" });
      subP.innerHTML = "Video: MOV, MP4, MKV, AVI, MXF, R3D, BRAW, and more<br/>Image: JPG, PNG, TIFF, EXR, HDR, DPX";
      dropZone.appendChild(subP);

      dropZone.appendChild(h("div", { className: "drop-zone-buttons" },
        h("button", { className: "btn btn-secondary", onClick: selectFiles }, ICONS.film(), " Select Files"),
        h("button", { className: "btn btn-secondary", onClick: selectFolder }, ICONS.folder(), " Select Folder"),
        h("button", { className: "btn btn-secondary", onClick: reviewExistingDataset, style: { marginLeft: "8px", borderColor: "var(--accent-dim)", color: "var(--accent)" } }, ICONS.image(), " Review Existing Dataset"),
        h("button", { className: "btn btn-secondary", onClick: trainExistingDataset, style: { borderColor: "var(--accent-dim)", color: "var(--accent)" } }, ICONS.play(), " Train LoRA"),
      ));

      container.appendChild(dropZone);

      if (state.files.length === 0) return;

      // File list
      renderFileList(container);

      // Config
      renderConfig(container);

      // Output dir
      renderOutputDir(container);

      // Estimate
      renderEstimate(container);

      // Action bar
      const canStart = state.depStatus === "ok" && state.files.length > 0 && state.outputDir;
      const actionBar = h("div", { className: "action-bar" },
        h("button", {
          className: "btn btn-primary",
          onClick: startProcessing,
          ...(canStart ? {} : { disabled: "true" }),
        }, ICONS.play(), " Build LoRA dataset"),
      );
      container.appendChild(actionBar);
    }

    function renderFileList(container) {
      const videoCount = state.files.filter(f => f.type === "video").length;
      const imageCount = state.files.filter(f => f.type === "image").length;
      const totalSize = state.files.reduce((s, f) => s + f.size, 0);

      const list = h("div", { className: "file-list" });
      const header = h("div", { className: "file-list-header" },
        h("div", { className: "file-list-stats" },
          h("span", { className: "stat-chip" }, `${state.files.length} files`),
          videoCount > 0 ? h("span", { className: "stat-chip video" }, `${videoCount} video`) : null,
          imageCount > 0 ? h("span", { className: "stat-chip image" }, `${imageCount} image`) : null,
          h("span", { className: "stat-chip" }, formatSize(totalSize)),

        h("button", { className: "btn-text", onClick: () => { state.files = []; render(); } }, "Clear all"),

      const capInput = h("input", {

      capGroup.appendChild(capInput);

      // Extract depth (SBS only)

      depthRow.appendChild(h("button", {
        className: `radio-btn ${state.config.extractDepth ? "active" : ""}`,
        onClick: () => { state.config.extractDepth = true; render(); },
      }, "On (180 SBS)"));
      depthRow.appendChild(h("button", {
        className: `radio-btn ${!state.config.extractDepth ? "active" : ""}`,
        onClick: () => { state.config.extractDepth = false; render(); },
      }, "Off"));
      depthGroup.appendChild(depthRow);

      if (state.config.extractDepth) {
        depthGroup.appendChild(h("div", { className: "label-hint", style: { marginTop: "8px" } },
          "Applies to 180° SBS. Best depth: FoundationStereo on an NVIDIA PC; copy dataset to Mac for training."));

        const beRow = h("div", { className: "radio-group" });
        [["auto", "Auto"], ["foundation_stereo", "FoundationStereo (CUDA)"], ["sgbm", "OpenCV SGBM"]].forEach(([val, label]) => {
          beRow.appendChild(h("button", {

        });
        depthGroup.appendChild(beRow);

        if (state.config.depthBackend === "foundation_stereo" && probe && probe.ok === false) {
          depthGroup.appendChild(h("div", { className: "dep-details", style: { marginTop: "6px" } },

        if (state.config.depthBackend === "foundation_stereo" && probe && probe.ok && !probe.foundation_stereo_ready) {
          depthGroup.appendChild(h("div", { className: "dep-details", style: { marginTop: "6px" } },
            "FoundationStereo not ready here (CUDA + repo + weights). Use a prep PC or Auto/SGBM for local previews."));

        depthGroup.appendChild(h("div", { className: "label-hint", style: { marginTop: "8px" } },
          "Optional paths (or set FOUNDATION_STEREO_ROOT on the prep machine):"));

          className: "num-input",
          type: "text",
          placeholder: "Path to FoundationStereo clone",

      panel.appendChild(grid);

    function makeSlider(label, hint, key, min, max, isPercent = false, editableNumber = false) {
      const group = h("div", { className: "config-group" });
      group.appendChild(h("label", {}, `${label} `, h("span", { className: "label-hint" }, hint)));
      const row = h("div", { className: "input-row" });
      const displayVal = isPercent ? Math.round(state.config[key] * 100) : state.config[key];
      const slider = h("input", { type: "range", min: String(min), max: String(max), value: String(displayVal) });
      slider.addEventListener("input", (e) => {
        state.config[key] = isPercent ? +e.target.value / 100 : +e.target.value;
        render();
      });
      row.appendChild(slider);
      if (editableNumber && !isPercent) {
        const input = h("input", {
          className: "num-input slider-num-input",
          type: "number",
          min: String(min),
          max: String(max),
          step: "1",
          value: String(displayVal),
        });
        const commit = () => {
          const parsed = Math.round(Number(input.value));
          if (!Number.isFinite(parsed)) {
            input.value = String(displayVal);
            return;
          }
          state.config[key] = Math.min(max, Math.max(min, parsed));
          render();
        };
        input.addEventListener("change", commit);
        input.addEventListener("blur", commit);
        row.appendChild(input);
      } else {
        row.appendChild(h("span", { className: "range-val" }, isPercent ? `${displayVal}%` : String(displayVal)));
      }
      group.appendChild(row);
      return group;
    }

    function renderOutputDir(container) {
      const row = h("div", { className: "output-dir-row" },
        h("span", { className: "output-dir-label" }, "Output:"),
        h("span", { className: "output-dir-path" }, state.outputDir || "No directory selected"),
        h("button", { className: "btn btn-secondary", onClick: selectOutputDir }, ICONS.folderOpen(), " Choose"),
      );
      container.appendChild(row);
    }

    function renderEstimate(container) {
      const videoCount = state.files.filter(f => f.type === "video").length;
      const imageCount = state.files.filter(f => f.type === "image").length;
      const estFramesPerVideo = Math.floor((30 * 60) / state.config.frameInterval);
      const totalFrames = videoCount * estFramesPerVideo + imageCount;
      const totalSamples = totalFrames;

      const bar = h("div", { className: "estimate-bar" });
      bar.appendChild(h("div", { className: "estimate-label" }, "Estimated output (assumes ~60s avg per video at 30fps)"));

      const stats = h("div", { className: "estimate-stats" },
        h("div", { className: "est-item highlight" },
          h("span", { className: "est-num" }, totalSamples.toLocaleString()),
          h("span", { className: "est-label" }, "training images (1 per frame)"),
        ),
      );
      bar.appendChild(stats);

      if (totalSamples < 500) {
        bar.appendChild(h("div", { className: "estimate-warn" },
          "Tip: 1k–2k+ diverse stereo 180 frames with captions usually give stronger LoRAs. Add more sources or tighten frame interval."
        ));
      }

      container.appendChild(bar);
    }

    function renderProcessing(container) {
      const view = h("div", { className: "processing-view" });

      const progress = state.processFileIndex >= 0
        ? ((state.processFileIndex + 1) / state.files.length) * 100
        : 2;

      view.appendChild(h("div", { className: "proc-header" },
        h("div", { className: "proc-spinner" }),
        h("div", {},
          h("h2", {}, "Generating Dataset"),
          h("p", { className: "proc-file" },
            state.processFile
              ? `Processing: ${state.processFile} (${state.processFileIndex + 1}/${state.files.length})`
              : "Initializing..."
          ),
        ),
      ));

      view.appendChild(h("div", { className: "progress-track" },
        h("div", { className: "progress-fill", style: { width: `${progress}%` } }),
      ));

      const logWindow = h("div", { className: "log-window", id: "log-window" });
      state.processLog.forEach((line) => {
        let cls = "log-line";
        if (line.includes("✓") || line.includes("COMPLETE")) cls += " success";
        else if (line.includes("ERROR") || line.includes("[stderr]")) cls += " error";
        else if (line.includes("===") || line.startsWith("[")) cls += " info";
        logWindow.appendChild(h("div", { className: cls }, line));
      });
      view.appendChild(logWindow);

      view.appendChild(h("div", { className: "proc-actions" },
        h("button", { className: "btn btn-danger", onClick: cancelProcessing }, ICONS.x(), " Cancel"),
      ));

      container.appendChild(view);

      // Auto-scroll log
      requestAnimationFrame(() => {
        const lw = document.getElementById("log-window");
        if (lw) lw.scrollTop = lw.scrollHeight;
      });
    }

    function renderComplete(container) {
      const r = state.results || {};
      const view = h("div", { className: "complete-view" });

      const checkIcon = h("div", { className: "complete-icon" });
      checkIcon.appendChild(ICONS.check());
      view.appendChild(checkIcon);
      view.appendChild(h("h2", {}, "Dataset Generation Complete"));

      view.appendChild(h("div", { className: "results-grid" },
        h("div", { className: "result-card" },
          h("span", { className: "result-num" }, ((r.total_samples ?? r.total_frames ?? r.total_pairs) || 0).toLocaleString()),
          h("span", { className: "result-label" }, "Training images"),
        ),
        h("div", { className: "result-card" },
          h("span", { className: "result-num" }, (r.total_frames || 0).toLocaleString()),
          h("span", { className: "result-label" }, "Source Frames"),
        ),
        h("div", { className: "result-card" },
          h("span", { className: "result-num" }, String(r.files_processed || 0)),
          h("span", { className: "result-label" }, "Files Processed"),
        ),
      ));

      const tree = h("div", { className: "output-structure" });
      tree.appendChild(h("h3", {}, "Output Structure"));
      tree.appendChild(h("pre", { className: "tree" },
`${state.outputDir || "dataset"}/
├── frames/             (${r.total_frames || r.total_samples || "?"} PNG + .txt captions)
├── depth/              (optional disparity; FoundationStereo on PC or SGBM)
├── source_equirects/   (extracted video frames)

      view.appendChild(tree);

      view.appendChild(h("div", { className: "complete-actions" },
        h("button", { className: "btn btn-secondary", onClick: () => {

        } }, ICONS.folderOpen(), " Open Output Folder"),
        h("button", { className: "btn btn-primary", onClick: () => openReviewFromComplete() }, ICONS.image(), " Review & Clean Dataset"),
        h("button", { className: "btn btn-primary", onClick: () => openTrainFromComplete(), style: { background: "var(--video-color)" } }, ICONS.play(), " Train LoRA"),
        h("button", { className: "btn btn-secondary", onClick: () => {
          state.view = "setup";

    // ── Actions ──

    async function selectFiles() {
      const files = await window.api.selectFiles();
      if (files.length > 0) {
        // Deduplicate
        const existing = new Set(state.files.map(f => f.path));
        state.files.push(...files.filter(f => !existing.has(f.path)));
        render();
      }
    }

    async function selectFolder() {
      const files = await window.api.selectFolder();
      if (files.length > 0) {
        const existing = new Set(state.files.map(f => f.path));
        state.files.push(...files.filter(f => !existing.has(f.path)));
        render();
      }
    }

    async function selectOutputDir() {
      const dir = await window.api.selectOutputDir();
      if (dir) {
        state.outputDir = dir;
        render();
      }
    }

    async function checkDeps() {
      state.depStatus = "checking";
      render();
      const result = await window.api.checkDependencies();
      state.depStatus = result.ok ? "ok" : "error";
      state.depError = result.error || null;
      state.depDetails = result.details || null;
      render();
    }

    async function startProcessing() {
      state.view = "processing";
      state.processing = true;
      state.processLog = [];
      state.processFile = null;
      state.processFileIndex = -1;
      render();

      const result = await window.api.startProcessing({
        files: state.files,
        config: state.config,
        outputDir: state.outputDir,
      });

      if (!result.ok) {
        state.processLog.push(`ERROR: ${result.error}`);
        render();
      }
    }

    async function cancelProcessing() {
      await window.api.cancelProcessing();
      state.view = "setup";
      state.processing = false;
      render();
    }

    // ── Review Source List (Level 1) ──

    let sourceThumbsLoading = false;
    let sourceThumbObserver = null;

    function getFilteredSources() {
      let sources = [...state.reviewSourceFiles];
      if (state.reviewSourceSearch) {
        const q = state.reviewSourceSearch.toLowerCase();
        sources = sources.filter(s => s.name.toLowerCase().includes(q));
      }
      const sortKey = state.reviewSourceSort;
      sources.sort((a, b) => {
        if (sortKey === "name") return a.name.localeCompare(b.name);
        if (sortKey === "frames") return b.frameCount - a.frameCount;
        if (sortKey === "pairs") return b.pairCount - a.pairCount;
        return 0;
      });
      return sources;
    }

    function renderReviewSources(container) {
      const view = h("div", { className: "source-list-view" });

      // Toolbar
      const toolbar = h("div", { className: "source-toolbar" });
      toolbar.appendChild(h("button", { className: "btn-back", onClick: () => {
        state.view = state.reviewEntryPoint;
        state.reviewFrames = [];
        state.reviewSourceFiles = [];
        state.reviewSourceSelection.clear();
        state.reviewSourceSearch = "";
        render();
      } }, "\u2190 Back"));

      toolbar.appendChild(h("div", { className: "review-stats" },
        h("strong", {}, `${state.reviewSourceFiles.length}`), ` source${state.reviewSourceFiles.length !== 1 ? "s" : ""} \u00b7 `,
        h("strong", {}, `${state.reviewTotalFrames}`), ` frames \u00b7 `,
        h("strong", {}, `${state.reviewTotalPairs}`), ` pairs`,
      ));

      view.appendChild(toolbar);

      // Search + Sort bar
      const searchBar = h("div", { style: { display: "flex", alignItems: "center", gap: "12px", padding: "10px 0", flexShrink: "0" } });

      const searchWrap = h("div", { className: "source-search-wrap" });
      const searchIcon = h("span", { className: "source-search-icon" },
        svgIcon('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>', 14)
      );
      searchWrap.appendChild(searchIcon);
      const searchInput = h("input", {
        className: "source-search",
        type: "text",
        placeholder: "Search sources...",
        value: state.reviewSourceSearch,
      });
      searchInput.addEventListener("input", (e) => {
        state.reviewSourceSearch = e.target.value;
        renderSourceList();
      });
      searchWrap.appendChild(searchInput);
      searchBar.appendChild(searchWrap);

      const sortWrap = h("div", { className: "source-sort-wrap" });
      sortWrap.appendChild(h("span", {}, "Sort:"));
      [["name", "Name"], ["frames", "Frames"], ["pairs", "Pairs"]].forEach(([key, label]) => {
        sortWrap.appendChild(h("button", {
          className: `source-sort-btn${state.reviewSourceSort === key ? " active" : ""}`,
          onClick: () => { state.reviewSourceSort = key; renderSourceList(); },
        }, label));
      });
      searchBar.appendChild(sortWrap);

      view.appendChild(searchBar);

      // Source list container
      if (state.reviewLoading) {
        view.appendChild(h("div", { className: "source-empty" }, "Loading dataset\u2026"));
      } else if (state.reviewSourceFiles.length === 0) {
        view.appendChild(h("div", { className: "source-empty" }, "No source files found in this dataset."));
      } else {
        const listContainer = h("div", { className: "source-list-container", id: "source-list-container" });
        const listInner = h("div", { id: "source-list-inner" });

        // "All Frames" entry
        const allRow = h("div", { className: "source-row all-frames-row", onClick: () => drillIntoSource("__all__") });
        allRow.appendChild(h("div", { style: { width: "18px" } }));
        allRow.appendChild(h("div", { className: "source-type-icon" },
          svgIcon('<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/>', 16)
        ));
        allRow.appendChild(h("div", { className: "source-info" },
          h("div", { className: "source-name" }, "All Frames"),
          h("div", { className: "source-meta" },
            h("strong", {}, `${state.reviewTotalFrames}`), ` frames \u00b7 `,
            h("strong", {}, `${state.reviewTotalPairs}`), ` pairs`,
          ),
        ));
        allRow.appendChild(h("div", { className: "source-arrow" }, svgIcon('<polyline points="9 18 15 12 9 6"/>', 14)));
        listInner.appendChild(allRow);

        // Source rows
        const filtered = getFilteredSources();
        if (filtered.length === 0 && state.reviewSourceSearch) {
          listInner.appendChild(h("div", { className: "source-empty" }, "No sources match your search."));
        }
        filtered.forEach((src) => {
          const isSelected = state.reviewSourceSelection.has(src.name);
          const row = h("div", { className: "source-row", "data-source": src.name });

          // Checkbox
          const checkbox = h("div", {
            className: `source-checkbox${isSelected ? " checked" : ""}`,
            onClick: (e) => { e.stopPropagation(); toggleSourceSelection(src.name); },
          });
          if (isSelected) checkbox.appendChild(ICONS.check());
          row.appendChild(checkbox);

          // Thumbnail
          const thumbDiv = h("div", { className: "source-thumb" });
          if (src.thumb) {
            thumbDiv.appendChild(h("img", { src: src.thumb, alt: src.name, draggable: "false" }));
          } else {
            thumbDiv.appendChild(h("div", { className: "source-thumb-placeholder", "data-source-thumb": src.name }));
          }
          row.appendChild(thumbDiv);

          // Type icon
          row.appendChild(h("div", { className: `source-type-icon ${src.type}` },
            src.type === "video" ? ICONS.film() : ICONS.image()
          ));

          // Info
          row.appendChild(h("div", { className: "source-info" },
            h("div", { className: "source-name", title: src.name }, src.name),
            h("div", { className: "source-meta" },
              h("strong", {}, `${src.frameCount}`), ` frame${src.frameCount !== 1 ? "s" : ""} \u00b7 `,
              h("strong", {}, `${src.pairCount}`), ` pairs`,
            ),
          ));

          // Arrow
          row.appendChild(h("div", { className: "source-arrow" }, svgIcon('<polyline points="9 18 15 12 9 6"/>', 14)));

          row.addEventListener("click", () => drillIntoSource(src.name));
          listInner.appendChild(row);
        });

        listContainer.appendChild(listInner);
        if (state.reviewSourceSelection.size > 0) {
          listContainer.style.paddingBottom = "60px";
        }
        view.appendChild(listContainer);
      }

      // Source selection bar
      if (state.reviewSourceSelection.size > 0) {
        const selSources = state.reviewSourceFiles.filter(s => state.reviewSourceSelection.has(s.name));
        const selFrames = selSources.reduce((sum, s) => sum + s.frameCount, 0);
        const selPairs = selSources.reduce((sum, s) => sum + s.pairCount, 0);

        view.appendChild(h("div", { className: "source-selection-bar" },
          h("div", { className: "sel-info" },
            h("strong", {}, `${state.reviewSourceSelection.size}`), ` source${state.reviewSourceSelection.size > 1 ? "s" : ""} \u00b7 `,
            h("strong", {}, `${selFrames}`), ` frames \u00b7 `,
            h("strong", {}, `${selPairs}`), ` pairs`,
          ),
          h("button", { className: "btn btn-secondary", onClick: () => {
            state.reviewSourceSelection.clear();
            render();
          } }, "Cancel"),
          h("button", { className: "btn btn-danger", onClick: () => {
            state.reviewSourceShowModal = true;
            render();
          } }, "Delete Selected Sources"),
        ));
      }

      // Source delete modal
      if (state.reviewSourceShowModal) {
        const selSources = state.reviewSourceFiles.filter(s => state.reviewSourceSelection.has(s.name));
        const selFrames = selSources.reduce((sum, s) => sum + s.frameCount, 0);
        const selPairs = selSources.reduce((sum, s) => sum + s.pairCount, 0);

        const overlay = h("div", { className: "review-modal-overlay", onClick: (e) => {
          if (e.target === e.currentTarget) { state.reviewSourceShowModal = false; render(); }
        } });
        const modal = h("div", { className: "review-modal" });
        modal.appendChild(h("h3", {}, "Delete Sources"));
        modal.appendChild(h("p", {},
          `Remove all data from ${state.reviewSourceSelection.size} source file${state.reviewSourceSelection.size > 1 ? "s" : ""}? This will delete ${selFrames} frame${selFrames !== 1 ? "s" : ""} and ${selPairs} associated conditioning pair${selPairs !== 1 ? "s" : ""}, including target images, conditioning crops, metadata, and source equirects. This cannot be undone.`
        ));
        modal.appendChild(h("div", { className: "modal-actions" },
          h("button", { className: "btn btn-secondary", onClick: () => {
            state.reviewSourceShowModal = false;
            render();
          } }, "Cancel"),
          h("button", { className: "btn btn-danger", onClick: () => executeSourceDelete() }, "Delete"),
        ));
        overlay.appendChild(modal);
        view.appendChild(overlay);
      }

      container.appendChild(view);

      requestAnimationFrame(() => setupSourceThumbObserver());
    }

    function renderSourceList() {
      const inner = document.getElementById("source-list-inner");
      if (!inner) { render(); return; }

      // Keep the "All Frames" row, rebuild the rest
      while (inner.children.length > 1) inner.removeChild(inner.lastChild);

      const filtered = getFilteredSources();
      if (filtered.length === 0 && state.reviewSourceSearch) {
        inner.appendChild(h("div", { className: "source-empty" }, "No sources match your search."));
        return;
      }

      filtered.forEach((src) => {
        const isSelected = state.reviewSourceSelection.has(src.name);
        const row = h("div", { className: "source-row", "data-source": src.name });

        const checkbox = h("div", {
          className: `source-checkbox${isSelected ? " checked" : ""}`,
          onClick: (e) => { e.stopPropagation(); toggleSourceSelection(src.name); },
        });
        if (isSelected) checkbox.appendChild(ICONS.check());
        row.appendChild(checkbox);

        const thumbDiv = h("div", { className: "source-thumb" });
        if (src.thumb) {
          thumbDiv.appendChild(h("img", { src: src.thumb, alt: src.name, draggable: "false" }));
        } else {
          thumbDiv.appendChild(h("div", { className: "source-thumb-placeholder", "data-source-thumb": src.name }));
        }
        row.appendChild(thumbDiv);

        row.appendChild(h("div", { className: `source-type-icon ${src.type}` },
          src.type === "video" ? ICONS.film() : ICONS.image()
        ));

        row.appendChild(h("div", { className: "source-info" },
          h("div", { className: "source-name", title: src.name }, src.name),
          h("div", { className: "source-meta" },
            h("strong", {}, `${src.frameCount}`), ` frame${src.frameCount !== 1 ? "s" : ""} \u00b7 `,
            h("strong", {}, `${src.pairCount}`), ` pairs`,
          ),
        ));

        row.appendChild(h("div", { className: "source-arrow" }, svgIcon('<polyline points="9 18 15 12 9 6"/>', 14)));
        row.addEventListener("click", () => drillIntoSource(src.name));
        inner.appendChild(row);
      });

      requestAnimationFrame(() => setupSourceThumbObserver());
    }

    function toggleSourceSelection(name) {
      if (state.reviewSourceSelection.has(name)) {
        state.reviewSourceSelection.delete(name);
      } else {
        state.reviewSourceSelection.add(name);
      }
      // Update checkbox UI in-place
      const rows = document.querySelectorAll(".source-row[data-source]");
      rows.forEach(row => {
        const sName = row.getAttribute("data-source");
        const cb = row.querySelector(".source-checkbox");
        if (!cb) return;
        if (state.reviewSourceSelection.has(sName)) {
          cb.classList.add("checked");
          if (!cb.querySelector("svg")) cb.appendChild(ICONS.check());
        } else {
          cb.classList.remove("checked");
          cb.innerHTML = "";
        }
      });
      // Re-render selection bar
      const existingBar = document.querySelector(".source-selection-bar");
      if (existingBar) existingBar.remove();
      const existingModal = document.querySelector(".review-modal-overlay");
      if (existingModal) existingModal.remove();
      const view = document.querySelector(".source-list-view");
      const listContainer = document.getElementById("source-list-container");
      if (!view || !listContainer) return;

      if (state.reviewSourceSelection.size > 0) {
        listContainer.style.paddingBottom = "60px";
        const selSources = state.reviewSourceFiles.filter(s => state.reviewSourceSelection.has(s.name));
        const selFrames = selSources.reduce((sum, s) => sum + s.frameCount, 0);
        const selPairs = selSources.reduce((sum, s) => sum + s.pairCount, 0);

        view.appendChild(h("div", { className: "source-selection-bar" },
          h("div", { className: "sel-info" },
            h("strong", {}, `${state.reviewSourceSelection.size}`), ` source${state.reviewSourceSelection.size > 1 ? "s" : ""} \u00b7 `,
            h("strong", {}, `${selFrames}`), ` frames \u00b7 `,
            h("strong", {}, `${selPairs}`), ` pairs`,
          ),
          h("button", { className: "btn btn-secondary", onClick: () => {
            state.reviewSourceSelection.clear();
            render();
          } }, "Cancel"),
          h("button", { className: "btn btn-danger", onClick: () => {
            state.reviewSourceShowModal = true;
            render();
          } }, "Delete Selected Sources"),
        ));
      } else {
        listContainer.style.paddingBottom = "0";
      }
    }

    function setupSourceThumbObserver() {
      if (sourceThumbObserver) sourceThumbObserver.disconnect();
      const container = document.getElementById("source-list-container");
      if (!container) return;

      const pending = new Set();
      sourceThumbObserver = new IntersectionObserver((entries) => {
        let needsLoad = false;
        for (const entry of entries) {
          if (entry.isIntersecting) {
            const name = entry.target.getAttribute("data-source-thumb");
            if (name) { pending.add(name); needsLoad = true; }
          }
        }
        if (needsLoad) {
          const toLoad = [...pending];
          pending.clear();
          loadSourceThumbnails(toLoad);
        }
      }, { root: container, rootMargin: "100px" });

      const placeholders = container.querySelectorAll("[data-source-thumb]");
      placeholders.forEach(el => sourceThumbObserver.observe(el));
    }

    async function loadSourceThumbnails(sourceNames) {
      if (sourceThumbsLoading || sourceNames.length === 0) return;
      sourceThumbsLoading = true;

      const sourcesToLoad = state.reviewSourceFiles.filter(s => sourceNames.includes(s.name) && !s.thumb);
      if (sourcesToLoad.length === 0) { sourceThumbsLoading = false; return; }

      try {
        const { thumbnails } = await window.api.generateSourceThumbnails({
          datasetDir: state.reviewDatasetDir,
          sources: sourcesToLoad.map(s => ({ name: s.name, firstFrame: s.firstFrame })),
        });

        for (const [name, dataUri] of Object.entries(thumbnails)) {
          const src = state.reviewSourceFiles.find(s => s.name === name);
          if (src) src.thumb = dataUri;

          const placeholder = document.querySelector(`[data-source-thumb="${CSS.escape(name)}"]`);
          if (placeholder) {
            const img = h("img", { src: dataUri, alt: name, draggable: "false" });
            placeholder.parentNode.replaceChild(img, placeholder);
          }
        }
      } catch (err) {
        console.error("Source thumbnail load error:", err);
      }

      sourceThumbsLoading = false;
    }

    async function executeSourceDelete() {
      state.reviewSourceShowModal = false;
      const toDelete = [...state.reviewSourceSelection];

      const result = await window.api.deleteSources({
        datasetDir: state.reviewDatasetDir,
        sourceNames: toDelete,
      });

      if (result.ok) {
        const deletedSet = new Set(toDelete);
        state.reviewSourceFiles = state.reviewSourceFiles.filter(s => !deletedSet.has(s.name));
        state.reviewFrames = state.reviewFrames.filter(f => !deletedSet.has(f.sourceFile));
        state.reviewSourceSelection.clear();
        state.reviewTotalFrames = result.remainingFrames;
        state.reviewTotalPairs = result.remainingPairs;
        render();

        const view = document.querySelector(".source-list-view");
        if (view) {
          const toast = h("div", { className: "review-toast" },
            `Removed ${result.deletedSources} source${result.deletedSources > 1 ? "s" : ""}, ${result.deletedFrames} frames, and ${result.deletedPairs} pairs`
          );
          view.appendChild(toast);
          setTimeout(() => toast.remove(), 3000);
        }
      } else {
        alert("Delete failed: " + (result.error || "Unknown error"));
      }
    }

    function drillIntoSource(sourceName) {
      state.reviewActiveSource = sourceName;
      state.reviewSelection.clear();
      state.reviewLastClicked = null;
      state.view = "review";
      render();
    }

    // ── Review Contact Sheet (Level 2) ──

    let reviewObserver = null;
    let thumbLoadDebounce = null;
    let thumbsLoading = false;

    function getVisibleFrames() {
      if (!state.reviewActiveSource || state.reviewActiveSource === "__all__") {
        return state.reviewFrames;
      }
      return state.reviewFrames.filter(f => f.sourceFile === state.reviewActiveSource);
    }

    function renderReview(container) {
      const visibleFrames = getVisibleFrames();
      const visiblePairs = visibleFrames.reduce((sum, f) => sum + f.pairCount, 0);
      const view = h("div", { className: "review-view" });

      // Toolbar with breadcrumb
      const toolbar = h("div", { className: "review-toolbar" });

      const breadcrumb = h("div", { className: "breadcrumb" });
      breadcrumb.appendChild(h("button", { className: "breadcrumb-link", onClick: () => {
        state.reviewActiveSource = null;
        state.reviewSelection.clear();
        state.view = "review-sources";
        render();
      } }, "\u2190 All Sources"));
      breadcrumb.appendChild(h("span", { className: "breadcrumb-sep" }, "\u203A"));
      const activeLabel = state.reviewActiveSource === "__all__" ? "All Frames" : (state.reviewActiveSource || "");
      breadcrumb.appendChild(h("span", { className: "breadcrumb-current", title: activeLabel }, activeLabel));
      toolbar.appendChild(breadcrumb);

      toolbar.appendChild(h("div", { className: "review-stats" },
        h("strong", {}, `${visibleFrames.length}`), ` frames \u00b7 `,
        h("strong", {}, `${visiblePairs}`), ` pairs`,
      ));

      toolbar.appendChild(h("button", { className: "btn-sm", onClick: () => {
        visibleFrames.forEach(f => state.reviewSelection.add(f.name));
        updateReviewSelectionUI();
      } }, "Select All"));

      toolbar.appendChild(h("button", { className: "btn-sm", onClick: () => {
        state.reviewSelection.clear();
        updateReviewSelectionUI();
      } }, "Select None"));

      toolbar.appendChild(h("button", { className: "btn-sm", onClick: () => {
        visibleFrames.forEach(f => {
          if (state.reviewSelection.has(f.name)) state.reviewSelection.delete(f.name);
          else state.reviewSelection.add(f.name);
        });
        updateReviewSelectionUI();
      } }, "Invert"));

      view.appendChild(toolbar);

      // Grid
      if (state.reviewLoading) {
        view.appendChild(h("div", { className: "review-loading-banner" }, "Loading dataset\u2026"));
      } else if (state.reviewFrames.length === 0) {
        view.appendChild(h("div", { className: "review-loading-banner" }, "No frames found in this dataset."));
      } else {
        const gridContainer = h("div", { className: "review-grid-container", id: "review-grid-container" });
        const grid = h("div", { className: "review-grid", id: "review-grid" });

        visibleFrames.forEach((frame, i) => {
          const isSelected = state.reviewSelection.has(frame.name);
          const cell = h("div", {
            className: `review-cell${isSelected ? " selected" : ""}`,
            "data-frame": frame.name,
            "data-index": String(i),
            onClick: (e) => handleCellClick(frame.name, i, e),
          });

          // Checkmark overlay
          const checkOverlay = h("div", { className: "check-overlay" });
          checkOverlay.appendChild(ICONS.check());
          cell.appendChild(checkOverlay);

          // Thumbnail
          const thumbWrapper = h("div", { className: "thumb-wrapper" });
          if (frame.thumb) {
            thumbWrapper.appendChild(h("img", { className: "thumb-img", src: frame.thumb, alt: frame.name, draggable: "false" }));
          } else {
            thumbWrapper.appendChild(h("div", { className: "thumb-placeholder", "data-thumb-name": frame.name }));
          }
          cell.appendChild(thumbWrapper);

          // Info
          cell.appendChild(h("div", { className: "cell-info" },
            h("span", { className: "frame-label", title: frame.name }, frame.name),
            h("span", { className: "pair-badge" }, `${frame.pairCount}`),
          ));

          grid.appendChild(cell);
        });

        gridContainer.appendChild(grid);

        // Adjust grid bottom padding when selection bar is visible
        if (state.reviewSelection.size > 0) {
          gridContainer.style.paddingBottom = "70px";
        }

        view.appendChild(gridContainer);
      }

      // Selection bar
      if (state.reviewSelection.size > 0) {
        const selectedPairs = state.reviewFrames
          .filter(f => state.reviewSelection.has(f.name))
          .reduce((sum, f) => sum + f.pairCount, 0);

        view.appendChild(h("div", { className: "review-selection-bar" },
          h("div", { className: "sel-info" },
            h("strong", {}, `${state.reviewSelection.size}`), ` frame${state.reviewSelection.size > 1 ? "s" : ""} selected \u00b7 `,
            h("strong", {}, `${selectedPairs}`), ` conditioning pair${selectedPairs !== 1 ? "s" : ""}`,
          ),
          h("button", { className: "btn btn-secondary", onClick: () => {
            state.reviewSelection.clear();
            render();
          } }, "Cancel"),
          h("button", { className: "btn btn-danger", onClick: () => {
            state.reviewShowModal = true;
            render();
          } }, `Delete Selected`),
        ));
      }

      // Delete confirmation modal
      if (state.reviewShowModal) {
        const selectedPairs = state.reviewFrames
          .filter(f => state.reviewSelection.has(f.name))
          .reduce((sum, f) => sum + f.pairCount, 0);

        const overlay = h("div", { className: "review-modal-overlay", onClick: (e) => {
          if (e.target === e.currentTarget) { state.reviewShowModal = false; render(); }
        } });
        const modal = h("div", { className: "review-modal" });
        modal.appendChild(h("h3", {}, "Delete Frames"));
        modal.appendChild(h("p", {},
          `Remove ${state.reviewSelection.size} frame${state.reviewSelection.size > 1 ? "s" : ""} and ${selectedPairs} associated conditioning pair${selectedPairs !== 1 ? "s" : ""}? This will delete the target images, conditioning crops, metadata files, and source equirects. This cannot be undone.`
        ));
        modal.appendChild(h("div", { className: "modal-actions" },
          h("button", { className: "btn btn-secondary", onClick: () => {
            state.reviewShowModal = false;
            render();
          } }, "Cancel"),
          h("button", { className: "btn btn-danger", onClick: () => executeDelete() }, "Delete"),
        ));
        overlay.appendChild(modal);
        view.appendChild(overlay);
      }

      container.appendChild(view);

      // Set up thumbnail lazy loading after DOM is built
      requestAnimationFrame(() => setupThumbObserver());
    }

    function setupThumbObserver() {
      // Clean up previous observer
      if (reviewObserver) reviewObserver.disconnect();

      const container = document.getElementById("review-grid-container");
      if (!container) return;

      const pendingFrames = new Set();

      reviewObserver = new IntersectionObserver((entries) => {
        let needsLoad = false;
        for (const entry of entries) {
          if (entry.isIntersecting) {
            const name = entry.target.getAttribute("data-thumb-name");
            if (name) {
              pendingFrames.add(name);
              needsLoad = true;
            }
          }
        }
        if (needsLoad) {
          clearTimeout(thumbLoadDebounce);
          thumbLoadDebounce = setTimeout(() => {
            loadThumbnails([...pendingFrames]);
            pendingFrames.clear();
          }, 100);
        }
      }, { root: container, rootMargin: "200px" });

      // Observe all placeholders
      const placeholders = container.querySelectorAll("[data-thumb-name]");
      placeholders.forEach(el => reviewObserver.observe(el));
    }

    async function loadThumbnails(frameNames) {
      if (thumbsLoading || frameNames.length === 0) return;
      thumbsLoading = true;

      // Process in batches of 30
      for (let i = 0; i < frameNames.length; i += 30) {
        const batch = frameNames.slice(i, i + 30);
        try {
          const { thumbnails } = await window.api.generateThumbnails({
            datasetDir: state.reviewDatasetDir,
            frameNames: batch,
          });

          // Update state and DOM directly (no full re-render)
          for (const [name, dataUri] of Object.entries(thumbnails)) {
            const frame = state.reviewFrames.find(f => f.name === name);
            if (frame) frame.thumb = dataUri;

            // Replace placeholder with img directly in DOM
            const placeholder = document.querySelector(`[data-thumb-name="${name}"]`);
            if (placeholder) {
              const img = h("img", { className: "thumb-img", src: dataUri, alt: name, draggable: "false" });
              placeholder.parentNode.replaceChild(img, placeholder);
            }
          }
        } catch (err) {
          console.error("Thumbnail load error:", err);
        }
      }

      thumbsLoading = false;
    }

    function handleCellClick(frameName, index, event) {
      const visibleFrames = getVisibleFrames();
      if (event.shiftKey && state.reviewLastClicked !== null) {
        const lastIndex = visibleFrames.findIndex(f => f.name === state.reviewLastClicked);
        if (lastIndex >= 0) {
          const start = Math.min(lastIndex, index);
          const end = Math.max(lastIndex, index);
          for (let i = start; i <= end; i++) {
            state.reviewSelection.add(visibleFrames[i].name);
          }
        }
      } else {
        // Toggle: click on/off, no clearing of others
        if (state.reviewSelection.has(frameName)) {
          state.reviewSelection.delete(frameName);
        } else {
          state.reviewSelection.add(frameName);
        }
      }

      state.reviewLastClicked = frameName;
      updateReviewSelectionUI();
    }

    // Update selection visuals in-place without full re-render (preserves scroll)
    function updateReviewSelectionUI() {
      // Update cell selected states
      const cells = document.querySelectorAll(".review-cell");
      cells.forEach(cell => {
        const name = cell.getAttribute("data-frame");
        if (state.reviewSelection.has(name)) {
          cell.classList.add("selected");
        } else {
          cell.classList.remove("selected");
        }
      });

      // Update selection bar
      const existingBar = document.querySelector(".review-selection-bar");
      if (existingBar) existingBar.remove();

      const existingModal = document.querySelector(".review-modal-overlay");
      if (existingModal) existingModal.remove();

      const view = document.querySelector(".review-view");
      const gridContainer = document.getElementById("review-grid-container");
      if (!view || !gridContainer) return;

      if (state.reviewSelection.size > 0) {
        gridContainer.style.paddingBottom = "70px";

        const selectedPairs = state.reviewFrames
          .filter(f => state.reviewSelection.has(f.name))
          .reduce((sum, f) => sum + f.pairCount, 0);

        const bar = h("div", { className: "review-selection-bar" },
          h("div", { className: "sel-info" },
            h("strong", {}, `${state.reviewSelection.size}`), ` frame${state.reviewSelection.size > 1 ? "s" : ""} selected \u00b7 `,
            h("strong", {}, `${selectedPairs}`), ` conditioning pair${selectedPairs !== 1 ? "s" : ""}`,
          ),
          h("button", { className: "btn btn-secondary", onClick: () => {
            state.reviewSelection.clear();
            updateReviewSelectionUI();
          } }, "Cancel"),
          h("button", { className: "btn btn-danger", onClick: () => {
            state.reviewShowModal = true;
            render();
          } }, "Delete Selected"),
        );
        view.appendChild(bar);
      } else {
        gridContainer.style.paddingBottom = "0";
      }
    }

    async function executeDelete() {
      state.reviewShowModal = false;
      const framesToDelete = [...state.reviewSelection];

      const result = await window.api.deleteFrames({
        datasetDir: state.reviewDatasetDir,
        frameNames: framesToDelete,
      });

      if (result.ok) {
        const deletedSet = new Set(framesToDelete);
        state.reviewFrames = state.reviewFrames.filter(f => !deletedSet.has(f.name));
        state.reviewSelection.clear();
        state.reviewLastClicked = null;
        state.reviewTotalFrames = result.remainingFrames;
        state.reviewTotalPairs = result.remainingPairs;

        // Rebuild source file stats from remaining frames
        rebuildSourceStats();

        render();

        const view = document.querySelector(".review-view");
        if (view) {
          const toast = h("div", { className: "review-toast" },
            `Removed ${result.deletedFrames} frame${result.deletedFrames > 1 ? "s" : ""} and ${result.deletedPairs} pairs`
          );
          view.appendChild(toast);
          setTimeout(() => toast.remove(), 3000);
        }
      } else {
        alert("Delete failed: " + (result.error || "Unknown error"));
      }
    }

    function rebuildSourceStats() {
      const sourceMap = new Map();
      for (const frame of state.reviewFrames) {
        const sf = frame.sourceFile || "__unknown__";
        if (!sourceMap.has(sf)) {
          sourceMap.set(sf, { frameCount: 0, pairCount: 0 });
        }
        const entry = sourceMap.get(sf);
        entry.frameCount++;
        entry.pairCount += frame.pairCount;
      }
      // Update existing source entries; remove sources with 0 frames
      state.reviewSourceFiles = state.reviewSourceFiles
        .map(s => {
          const stats = sourceMap.get(s.name);
          if (!stats) return null;
          return { ...s, frameCount: stats.frameCount, pairCount: stats.pairCount };
        })
        .filter(Boolean);
    }

    async function reviewExistingDataset() {
      const result = await window.api.selectDatasetDir();
      if (!result || result.error) {
        if (result && result.message) alert(result.message);
        return;
      }
      state.reviewEntryPoint = "setup";
      await loadReviewDataset(result.path);
    }

    async function openReviewFromComplete() {
      if (!state.outputDir) return;
      state.reviewEntryPoint = "complete";
      await loadReviewDataset(state.outputDir);
    }

    async function loadReviewDataset(dir) {
      state.reviewDatasetDir = dir;
      state.reviewLoading = true;
      state.reviewFrames = [];
      state.reviewSourceFiles = [];
      state.reviewSelection.clear();
      state.reviewSourceSelection.clear();
      state.reviewLastClicked = null;
      state.reviewActiveSource = null;
      state.reviewSourceSearch = "";
      state.view = "review-sources";
      render();

      const result = await window.api.loadDataset(dir);
      state.reviewLoading = false;

      if (result.ok) {
        state.reviewFrames = result.frames;
        state.reviewSourceFiles = result.sourceFiles || [];
        state.reviewTotalPairs = result.totalPairs;
        state.reviewTotalFrames = result.totalFrames;
      } else {
        alert("Failed to load dataset: " + (result.error || "Unknown error"));
        state.view = state.reviewEntryPoint;
      }
      render();
    }

    function renderTrainPreparing(view) {

      ));
