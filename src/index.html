    function renderTrainDashboard(view) {
      const p = state.trainProgress || {};
      const step = p.current_step || 0;
      const total = p.total_steps || 1;
      const pct = total > 0 ? ((step / total) * 100) : 0;

      // Header — adapts to phase: loading, preprocessing, or training
      const isLoading = p.phase === "loading" || p.status === "loading";
      const isPreprocessing = p.phase === "preprocessing" || p.status === "preprocessing";
      const isPreTrain = isLoading || isPreprocessing || (step === 0 && !p.loss);
      const headerSection = h("div", { className: "train-section" });

      if (isPreTrain) {
        const elapsed = p.elapsed_seconds || 0;
        let title, detail, hint, barPct;

        if (isPreprocessing && p.preprocess_progress) {
          const pp = p.preprocess_progress;
          title = "Preprocessing Dataset";
          detail = p.phase_detail || `Processing ${pp.current.toLocaleString()} / ${pp.total.toLocaleString()} examples`;
          hint = elapsed > 0
            ? `Elapsed: ${formatTime(elapsed)} \u00b7 Tokenizing text prompts and building cache`
            : "Starting preprocessing...";
          barPct = pp.pct || 0;
        } else {
          title = "Loading Model";
          detail = p.phase_detail || "Loading model weights and tokenizers...";
          hint = elapsed > 0
            ? `Elapsed: ${formatTime(elapsed)} \u00b7 FLUX.1-dev is ~24GB \u2014 first load can take 10\u201315 min on Apple Silicon`
            : "Starting up...";
          barPct = null;
        }

        headerSection.appendChild(h("div", { style: { display: "flex", alignItems: "center", gap: "12px", marginBottom: "12px" } },
          h("div", { className: "proc-spinner" }),
          h("h2", { style: { margin: 0 } }, title),
        ));
        headerSection.appendChild(h("div", { style: { padding: "12px 0" } },
          h("div", { style: {
            fontFamily: "'JetBrains Mono', monospace", fontSize: "12px",
            color: "var(--accent)", marginBottom: "8px", opacity: "0.8",
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
          }}, detail),
          h("div", { style: { fontSize: "12px", color: "var(--text-muted)" } }, hint),
        ));
        if (barPct != null) {
          headerSection.appendChild(h("div", { className: "progress-track", style: { marginTop: "12px" } },
            h("div", { className: "progress-fill", style: { width: `${barPct}%` } }),
          ));
        } else {
          headerSection.appendChild(h("div", { className: "progress-track", style: { marginTop: "12px" } },
            h("div", { className: "progress-fill loading-pulse", style: { width: "100%" } }),
          ));
        }
      } else {
        headerSection.appendChild(h("div", { style: { display: "flex", alignItems: "center", gap: "12px", marginBottom: "12px" } },
          h("div", { className: "proc-spinner" }),
          h("h2", { style: { margin: 0 } }, "Training FLUX LoRA"),
        ));
        headerSection.appendChild(renderRadialProgress(step, total, p.eta_seconds, state.trainLossHistory));
        headerSection.appendChild(h("div", { className: "progress-track", style: { marginTop: "12px" } },
          h("div", { className: "progress-fill", style: { width: `${pct}%` } }),
        ));
      }
      view.appendChild(headerSection);

      // Stats row + convergence gauge
      const statsRow = h("div", { className: "train-stats-row" });
      statsRow.appendChild(trainStatCard("Loss", p.loss != null ? p.loss.toFixed(4) : "--", "loss"));
      statsRow.appendChild(trainStatCard("LR", p.learning_rate != null ? p.learning_rate.toExponential(1) : "--", "lr"));
      statsRow.appendChild(trainStatCard("Steps/s", p.steps_per_second != null ? p.steps_per_second.toFixed(2) : "--", "speed"));
      statsRow.appendChild(trainStatCard("Elapsed", p.elapsed_seconds ? formatTime(p.elapsed_seconds) : "--", "elapsed"));
      if (state.trainLossHistory.length >= 4) {
        statsRow.appendChild(renderConvergenceGauge(state.trainLossHistory));
      }
      view.appendChild(statsRow);

      // Oscilloscope loss chart
      if (state.trainLossHistory.length > 1) {
        const chartSection = h("div", { className: "train-chart-container" });
        const lastLoss = state.trainLossHistory[state.trainLossHistory.length - 1];
        chartSection.appendChild(h("div", { className: "oscilloscope-header" },
          h("h3", {}, "Loss Waveform"),
          h("span", { className: "scope-readout" },
            `${state.trainLossHistory.length} samples \u00b7 latest ${lastLoss ? lastLoss[1].toFixed(4) : "--"}`
          ),
        ));
        const canvas = h("canvas", { id: "loss-chart", width: "800", height: "220" });
        chartSection.appendChild(canvas);
        view.appendChild(chartSection);
        requestAnimationFrame(() => drawLossChart());
      }

      // Validation progress: conditioning vs generated, with step timeline
      if (state.trainValidationImages.length > 0) {
        const valSection = h("div", { className: "train-section" });
        valSection.appendChild(h("h3", {}, "Validation Progress"));
        const entries = state.trainValidationImages;

        const setupDrag = () => {
          requestAnimationFrame(() => {
            const el = document.getElementById("val-compare");
            if (!el) return;
            let dragging = false;
            const updatePos = (clientX) => {
              const rect = el.getBoundingClientRect();
              const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
              const pctStr = (pct * 100) + "%";
              const div = document.getElementById("val-divider");
              const overlay = document.getElementById("val-overlay-right");
              if (div) div.style.left = pctStr;
              if (overlay) overlay.style.width = ((1 - pct) * 100) + "%";
            };
            el.addEventListener("mousedown", (e) => { dragging = true; updatePos(e.clientX); });
            document.addEventListener("mousemove", (e) => { if (dragging) updatePos(e.clientX); });
            document.addEventListener("mouseup", () => { dragging = false; });
          });
        };

        if (entries.length === 1) {
          const entry = entries[0];
          const leftSrc = entry.conditioning?.dataUri;
          const rightSrc = entry.samples[0]?.dataUri;
          if (leftSrc && rightSrc) {
            const compare = h("div", { className: "val-compare", id: "val-compare" });
            compare.appendChild(h("img", { src: leftSrc, alt: "Conditioning" }));
            const overlayRight = h("div", { className: "val-overlay-right", id: "val-overlay-right", style: { width: "50%" } });
            overlayRight.appendChild(h("img", { src: rightSrc, alt: "Generated" }));
            compare.appendChild(overlayRight);
            compare.appendChild(h("div", { className: "val-divider", id: "val-divider", style: { left: "50%" } }));
            compare.appendChild(h("span", { className: "val-pill left" }, "Input"));
            compare.appendChild(h("span", { className: "val-pill right" }, `Step ${entry.step}`));
            valSection.appendChild(compare);
            setupDrag();
          } else if (rightSrc) {
            const gallery = h("div", { className: "train-val-gallery" });
            gallery.appendChild(h("div", { className: "train-val-item" },
              h("img", { src: rightSrc, alt: "Generated" }),
              h("div", { className: "val-step" }, `Step ${entry.step}`),
            ));
            valSection.appendChild(gallery);
          }
        } else {
          let [leftIdx, rightIdx] = state.trainValCompareIdx;
          if (rightIdx < 0) rightIdx = entries.length - 1;
          leftIdx = Math.max(0, Math.min(leftIdx, entries.length - 1));
          rightIdx = Math.max(0, Math.min(rightIdx, entries.length - 1));
          if (leftIdx === rightIdx && entries.length > 1) leftIdx = Math.max(0, rightIdx - 1);

          const leftImg = entries[leftIdx].samples[0]?.dataUri;
          const rightImg = entries[rightIdx].samples[0]?.dataUri;
          if (leftImg && rightImg) {
            const compare = h("div", { className: "val-compare", id: "val-compare" });
            compare.appendChild(h("img", { src: leftImg, alt: "Earlier" }));
            const overlayRight = h("div", { className: "val-overlay-right", id: "val-overlay-right", style: { width: "50%" } });
            overlayRight.appendChild(h("img", { src: rightImg, alt: "Later" }));
            compare.appendChild(overlayRight);
            compare.appendChild(h("div", { className: "val-divider", id: "val-divider", style: { left: "50%" } }));
            compare.appendChild(h("span", { className: "val-pill left" }, `Step ${entries[leftIdx].step}`));
            compare.appendChild(h("span", { className: "val-pill right" }, `Step ${entries[rightIdx].step}`));
            valSection.appendChild(compare);
            setupDrag();
          }

          if (entries[0].conditioning) {
            valSection.appendChild(h("div", { className: "val-ref" },
              h("img", { src: entries[0].conditioning.dataUri, alt: "Conditioning" }),
              h("span", {}, "Conditioning input"),
            ));
          }

          const strip = h("div", { className: "val-filmstrip" });
          entries.forEach((entry, i) => {
            if (!entry.samples[0]) return;
            const isActive = i === leftIdx || i === rightIdx;
            const thumb = h("div", {
              className: isActive ? "val-thumb active" : "val-thumb",
              onClick: () => {
                if (i < rightIdx) state.trainValCompareIdx = [i, rightIdx];
                else state.trainValCompareIdx = [leftIdx, i];
                render();
              }
            });
            thumb.appendChild(h("img", { src: entry.samples[0].dataUri }));
            thumb.appendChild(h("div", { className: "val-thumb-label" }, String(entry.step)));
            strip.appendChild(thumb);
          });
          valSection.appendChild(strip);
        }
        view.appendChild(valSection);
      }

      // Console log panel
      view.appendChild(renderTrainLogPanel("train-log-dash"));

      // Cancel button
      view.appendChild(h("div", { className: "train-actions" },
        h("button", { className: "btn btn-danger", onClick: cancelTraining }, ICONS.x(), " Cancel Training"),
      ));

    function renderRadialProgress(step, total, etaSeconds, lossHistory) {
      const pct = total > 0 ? step / total : 0;
      const R = 52, stroke = 6, innerR = 42, innerStroke = 4;
      const size = (R + stroke) * 2;
      const cx = size / 2, cy = size / 2;
      const circumOuter = 2 * Math.PI * R;
      const circumInner = 2 * Math.PI * innerR;
      const outerOffset = circumOuter * (1 - pct);

      let trendPct = 0.5;
      if (lossHistory.length >= 40) {
        const recent = lossHistory.slice(-20).map(d => d[1]);
        const older = lossHistory.slice(-40, -20).map(d => d[1]);
        const avgRecent = recent.reduce((a, b) => a + b, 0) / recent.length;
        const avgOlder = older.reduce((a, b) => a + b, 0) / older.length;
        const delta = (avgOlder - avgRecent) / (avgOlder || 1);
        trendPct = Math.max(0, Math.min(1, 0.5 + delta * 5));
      } else if (lossHistory.length >= 6) {
        const recent = lossHistory.slice(-3).map(d => d[1]);
        const older = lossHistory.slice(-6, -3).map(d => d[1]);
        const avgR = recent.reduce((a, b) => a + b, 0) / recent.length;
        const avgO = older.reduce((a, b) => a + b, 0) / older.length;
        const delta = (avgO - avgR) / (avgO || 1);
        trendPct = Math.max(0, Math.min(1, 0.5 + delta * 5));
      }
      const innerOffset = circumInner * (1 - trendPct);
      const trendColor = trendPct > 0.6 ? "#4ecdc4" : trendPct > 0.4 ? "#f0c674" : "#f87171";

      const endAngle = -Math.PI / 2 + pct * 2 * Math.PI;
      const dotX = cx + R * Math.cos(endAngle);
      const dotY = cy + R * Math.sin(endAngle);

      const svgNs = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNs, "svg");
      svg.setAttribute("width", size); svg.setAttribute("height", size);
      svg.setAttribute("viewBox", `0 0 ${size} ${size}`);

      const defs = document.createElementNS(svgNs, "defs");
      const filter = document.createElementNS(svgNs, "filter");
      filter.id = "ringGlow";
      const blur = document.createElementNS(svgNs, "feGaussianBlur");
      blur.setAttribute("stdDeviation", "3"); blur.setAttribute("result", "glow");
      const merge = document.createElementNS(svgNs, "feMerge");
      const mn1 = document.createElementNS(svgNs, "feMergeNode"); mn1.setAttribute("in", "glow");
      const mn2 = document.createElementNS(svgNs, "feMergeNode"); mn2.setAttribute("in", "SourceGraphic");
      merge.appendChild(mn1); merge.appendChild(mn2);
      filter.appendChild(blur); filter.appendChild(merge);
      defs.appendChild(filter);
      svg.appendChild(defs);

      const makeCircle = (r, sw, dasharray, dashoffset, color, opacity) => {
        const c = document.createElementNS(svgNs, "circle");
        c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", r);
        c.setAttribute("fill", "none"); c.setAttribute("stroke", color);
        c.setAttribute("stroke-width", sw); c.setAttribute("opacity", opacity);
        c.setAttribute("stroke-dasharray", dasharray);
        c.setAttribute("stroke-dashoffset", dashoffset);
        c.setAttribute("stroke-linecap", "round");
        c.setAttribute("transform", `rotate(-90 ${cx} ${cy})`);
        return c;
      };

      svg.appendChild(makeCircle(R, stroke, circumOuter, 0, "#1e222c", 1));
      const outerArc = makeCircle(R, stroke, circumOuter, outerOffset, "#4ecdc4", 1);
      outerArc.setAttribute("filter", "url(#ringGlow)");
      svg.appendChild(outerArc);

      svg.appendChild(makeCircle(innerR, innerStroke, circumInner, 0, "#1e222c", 1));
      svg.appendChild(makeCircle(innerR, innerStroke, circumInner, innerOffset, trendColor, 0.7));

      if (pct > 0) {
        const dot = document.createElementNS(svgNs, "circle");
        dot.setAttribute("cx", dotX); dot.setAttribute("cy", dotY);
        dot.setAttribute("r", "4"); dot.setAttribute("fill", "#4ecdc4");
        dot.classList.add("ring-glow-dot");
        svg.appendChild(dot);
      }

      const wrapper = h("div", { className: "radial-ring-wrapper" });
      wrapper.appendChild(svg);
      wrapper.appendChild(h("div", { className: "ring-stats" },
        h("div", { className: "ring-step" }, step.toLocaleString()),
        h("div", { className: "ring-total" }, `/ ${total.toLocaleString()} steps`),
        h("div", { className: "ring-eta" }, etaSeconds ? `ETA ${formatTime(etaSeconds)}` : "Calculating..."),
      ));
      return wrapper;
    }

    function renderConvergenceGauge(lossHistory) {
      const wrap = h("div", { className: "convergence-gauge-wrap" });
      const canvasEl = h("canvas", { id: "convergence-gauge", width: "200", height: "110" });
      wrap.appendChild(canvasEl);

      let velocity = 0;
      let statusText = "Waiting for data";
      if (lossHistory.length >= 20) {
        const window1 = lossHistory.slice(-20);
        const window2 = lossHistory.slice(-40, -20);
        if (window2.length >= 10) {
          const avg1 = window1.map(d => d[1]).reduce((a, b) => a + b, 0) / window1.length;
          const avg2 = window2.map(d => d[1]).reduce((a, b) => a + b, 0) / window2.length;
          velocity = (avg2 - avg1) / (avg2 || 1);
        }
      } else if (lossHistory.length >= 4) {
        const half = Math.floor(lossHistory.length / 2);
        const first = lossHistory.slice(0, half).map(d => d[1]);
        const second = lossHistory.slice(half).map(d => d[1]);
        const avg1 = first.reduce((a, b) => a + b, 0) / first.length;
        const avg2 = second.reduce((a, b) => a + b, 0) / second.length;
        velocity = (avg1 - avg2) / (avg1 || 1);
      }

      const clamped = Math.max(-1, Math.min(1, velocity * 10));
      if (clamped > 0.15) statusText = "Converging";
      else if (clamped > 0.03) statusText = "Slow convergence";
      else if (clamped > -0.03) statusText = "Plateau";
      else if (clamped > -0.15) statusText = "Slight divergence";
      else statusText = "Diverging";

      wrap.appendChild(h("div", { className: "gauge-value" }, statusText));
      wrap.appendChild(h("div", { className: "gauge-label" }, `Loss velocity: ${(velocity * 100).toFixed(2)}%`));

      requestAnimationFrame(() => {
        const c = document.getElementById("convergence-gauge");
        if (!c) return;
        const ctx = c.getContext("2d");
        const W = 200, H = 110;
        c.width = W; c.height = H;
        const cx = W / 2, cy = H - 10;
        const r = 70;

        ctx.fillStyle = "#0d1017";
        ctx.fillRect(0, 0, W, H);

        const zones = [
          { start: Math.PI, end: Math.PI + Math.PI * 0.33, color: "#f87171" },
          { start: Math.PI + Math.PI * 0.33, end: Math.PI + Math.PI * 0.66, color: "#f0c674" },
          { start: Math.PI + Math.PI * 0.66, end: 2 * Math.PI, color: "#4ecdc4" },
        ];
        for (const z of zones) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, z.start, z.end);
          ctx.strokeStyle = z.color;
          ctx.globalAlpha = 0.2;
          ctx.lineWidth = 10;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Tick marks
        ctx.strokeStyle = "#3a4052";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 10; i++) {
          const a = Math.PI + (i / 10) * Math.PI;
          const x1 = cx + (r + 6) * Math.cos(a), y1 = cy + (r + 6) * Math.sin(a);
          const x2 = cx + (r - 6) * Math.cos(a), y2 = cy + (r - 6) * Math.sin(a);
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }

        // Needle: clamped maps -1..1 to PI..2PI (right=converging, left=diverging)
        const needleAngle = Math.PI + ((1 - clamped) / 2) * Math.PI;
        const nx = cx + (r - 16) * Math.cos(needleAngle);
        const ny = cy + (r - 16) * Math.sin(needleAngle);

        ctx.save();
        ctx.shadowColor = "#4ecdc4";
        ctx.shadowBlur = 6;
        ctx.strokeStyle = "#e4e8f0";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nx, ny); ctx.stroke();
        ctx.restore();

        ctx.fillStyle = "#e4e8f0";
        ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();

        // Labels
        ctx.fillStyle = "#5c6478";
        ctx.font = "9px 'JetBrains Mono', monospace";
        ctx.textAlign = "right";
        ctx.fillText("DIV", cx - r + 6, cy + 2);
        ctx.textAlign = "left";
        ctx.fillText("CONV", cx + r - 24, cy + 2);
      });

      return wrap;
    }

    function trainStatCard(label, value, historyKey) {
      const card = h("div", { className: "train-stat-card" });
      const sh = state.trainStatHistory;
      const arr = historyKey && sh[historyKey] ? sh[historyKey] : [];

      // Trend arrow
      let trendEl = null;
      if (arr.length >= 3) {
        const recent = arr.slice(-3).reduce((a, b) => a + b, 0) / 3;
        const older = arr.slice(-6, -3);
        if (older.length >= 2) {
          const olderAvg = older.reduce((a, b) => a + b, 0) / older.length;
          const diff = recent - olderAvg;
          const threshold = Math.abs(olderAvg) * 0.005 || 1e-8;
          const isGood = (historyKey === "loss") ? diff < -threshold : diff > threshold;
          const isBad = (historyKey === "loss") ? diff > threshold : diff < -threshold;
          const arrow = diff > threshold ? "\u25B2" : diff < -threshold ? "\u25BC" : "\u25CF";
          const cls = isGood ? "stat-trend good" : isBad ? "stat-trend bad" : "stat-trend flat";
          trendEl = h("span", { className: cls }, arrow);
        }
      }

      const valueRow = h("div", { className: "stat-value-row" });
      valueRow.appendChild(h("span", { className: "stat-value" }, value));
      if (trendEl) valueRow.appendChild(trendEl);
      card.appendChild(valueRow);

      card.appendChild(h("div", { className: "stat-label" }, label));

      // Micro-sparkline canvas
      if (arr.length >= 2 && historyKey) {
        const sparkCanvas = h("canvas", {
          className: "stat-sparkline",
          id: `sparkline-${historyKey}`,
          width: "60", height: "20"
        });
        card.appendChild(sparkCanvas);
        requestAnimationFrame(() => drawMicroSparkline(`sparkline-${historyKey}`, arr, historyKey));
      }

      return card;
    }

    function drawMicroSparkline(canvasId, data, key) {
      const c = document.getElementById(canvasId);
      if (!c || data.length < 2) return;
      const ctx = c.getContext("2d");
      const W = 60, H = 20;
      c.width = W; c.height = H;

      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;

      const xStep = W / (data.length - 1);
      const yScale = (v) => H - 2 - ((v - min) / range) * (H - 4);

      ctx.clearRect(0, 0, W, H);

      // Fill gradient under the line
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, "rgba(78,205,196,0.2)");
      grad.addColorStop(1, "rgba(78,205,196,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, H);
      data.forEach((v, i) => ctx.lineTo(i * xStep, yScale(v)));
      ctx.lineTo((data.length - 1) * xStep, H);
      ctx.closePath();
      ctx.fill();

      // Line
      ctx.strokeStyle = key === "loss" ? "#4ecdc4" : key === "lr" ? "#a78bfa" : "#f0c674";
      ctx.lineWidth = 1;
      ctx.lineJoin = "round";
      ctx.beginPath();
      data.forEach((v, i) => {
        const x = i * xStep, y = yScale(v);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

      const logEl = h("div", {
        className: `train-log ${state.trainLogExpanded ? "expanded" : "compact"}`,
        id: logElId,
      });

      for (const entry of displayLines) {
        const isObj = entry && typeof entry === "object";
        const type = isObj ? (entry.type || "info") : "info";
        const msg = isObj ? (entry.message || JSON.stringify(entry)) : String(entry);
        const ts = isObj && entry.ts ? new Date(entry.ts).toLocaleTimeString("en-US", { hour12: false }) : "";

        const lineClass = `log-line log-${type}`;
        const line = h("div", { className: lineClass },
          h("span", { className: "log-ts" }, ts),
          h("span", { className: "log-msg" }, msg),
        );

      panel.appendChild(logEl);

      // Auto-scroll to bottom
      requestAnimationFrame(() => {
        const el = document.getElementById(logElId);
        if (el) el.scrollTop = el.scrollHeight;
      });

      return section;
    }

    function formatTime(seconds) {
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);
      if (hrs > 0) return `${hrs}h ${mins}m`;
      if (mins > 0) return `${mins}m ${secs}s`;
      return `${secs}s`;
    }

    function drawLossChart() {
      const canvas = document.getElementById("loss-chart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width - 32;
      canvas.height = 220;
      const W = canvas.width, H = canvas.height;
      const pad = { top: 14, right: 14, bottom: 28, left: 54 };

      const allData = state.trainLossHistory;
      if (allData.length < 2) return;

      const data = allData.slice(-200);
      const steps = data.map(d => d[0]);
      const losses = data.map(d => d[1]);
      const minStep = steps[0], maxStep = steps[steps.length - 1];
      const minLoss = Math.min(...losses) * 0.95;
      const maxLoss = Math.max(...losses) * 1.05;

      const plotW = W - pad.left - pad.right;
      const plotH = H - pad.top - pad.bottom;
      const xScale = (v) => pad.left + ((v - minStep) / (maxStep - minStep || 1)) * plotW;
      const yScale = (v) => pad.top + (1 - (v - minLoss) / (maxLoss - minLoss || 1)) * plotH;

      ctx.fillStyle = "#0d1017";
      ctx.fillRect(0, 0, W, H);

      // Subtle vignette
      const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, W * 0.7);
      vg.addColorStop(0, "transparent");
      vg.addColorStop(1, "rgba(0,0,0,0.35)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.setLineDash([2, 4]);
      ctx.strokeStyle = "rgba(78,205,196,0.08)";
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 5; i++) {
        const y = pad.top + (i / 5) * plotH;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
      }
      for (let i = 0; i <= 4; i++) {
        const x = pad.left + (i / 4) * plotW;
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
      }
      ctx.setLineDash([]);

      // Axis labels
      ctx.fillStyle = "#3a4052";
      ctx.font = "10px 'JetBrains Mono', monospace";
      ctx.textAlign = "right";
      for (let i = 0; i <= 5; i++) {
        const val = maxLoss - (i / 5) * (maxLoss - minLoss);
        ctx.fillText(val.toFixed(3), pad.left - 6, pad.top + (i / 5) * plotH + 3);
      }
      ctx.textAlign = "center";
      const stepInterval = maxStep - minStep;
      for (let i = 0; i <= 4; i++) {
        const s = Math.round(minStep + (i / 4) * stepInterval);
        ctx.fillText(String(s), pad.left + (i / 4) * plotW, H - 8);
      }

      // Current loss scan line
      const currentLoss = losses[losses.length - 1];
      const scanY = yScale(currentLoss);
      ctx.strokeStyle = "rgba(78,205,196,0.12)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(pad.left, scanY); ctx.lineTo(W - pad.right, scanY); ctx.stroke();

      // Build path points
      const pts = data.map(([step, loss]) => [xScale(step), yScale(loss)]);

      // Triple-pass phosphor glow (wide dim, medium, sharp bright)
      const passes = [
        { width: 6, alpha: 0.08, blur: 12 },
        { width: 3, alpha: 0.25, blur: 6 },
        { width: 1.5, alpha: 0.9, blur: 2 },
      ];

      for (const pass of passes) {
        ctx.save();
        ctx.globalAlpha = pass.alpha;
        ctx.shadowColor = "#4ecdc4";
        ctx.shadowBlur = pass.blur;
        ctx.strokeStyle = "#4ecdc4";
        ctx.lineWidth = pass.width;
        ctx.lineJoin = "round";
        ctx.beginPath();
        pts.forEach(([x, y], i) => {
          // Fade out older points on the left edge
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.restore();
      }

      // Left-edge fade mask
      if (data.length > 20) {
        const fadeW = Math.min(60, plotW * 0.15);
        const fadeGrad = ctx.createLinearGradient(pad.left, 0, pad.left + fadeW, 0);
        fadeGrad.addColorStop(0, "#0d1017");
        fadeGrad.addColorStop(1, "rgba(13,16,23,0)");
        ctx.fillStyle = fadeGrad;
        ctx.fillRect(pad.left, pad.top, fadeW, plotH);
      }

      // Bright endpoint dot
      if (pts.length > 0) {
        const [ex, ey] = pts[pts.length - 1];
        ctx.save();
        ctx.shadowColor = "#4ecdc4";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#4ecdc4";
        ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // Spike detection: flash container border
      if (allData.length > 10) {
        const recent = allData.slice(-10).map(d => d[1]);
        const avg = recent.reduce((a, b) => a + b, 0) / recent.length;
        const newest = recent[recent.length - 1];
        const container = canvas.closest(".train-chart-container");
        if (container) {
          if (Math.abs(newest - avg) / (avg || 1) > 0.15) {
            container.classList.add("spike");
            setTimeout(() => container.classList.remove("spike"), 1500);
          }
        }
      }
    }

    // ── Training Actions ──

    async function selectTrainDataset() {
      const result = await window.api.selectDatasetDir();
      if (result && result.ok) {
        state.trainDatasetDir = result.path;
        await loadTrainDatasetInfo();
        render();
      } else if (result && result.message) {
        alert(result.message);
      }
    }

    async function selectTrainOutputDir() {
      const dir = await window.api.selectOutputDir();
      if (dir) {
        state.trainOutputDir = dir;
        render();
      }
    }

    async function trainExistingDataset() {
      const result = await window.api.selectDatasetDir();
      if (!result || result.error) {
        if (result && result.message) alert(result.message);
        return;
      }
      state.trainDatasetDir = result.path;
      state.trainEntryPoint = "setup";
      state.trainView = "config";
      state.view = "train";
      await detectTrainHardware();
      await loadTrainDatasetInfo();
      render();
    }

    async function openTrainFromComplete() {
      state.trainDatasetDir = state.outputDir;
      state.trainEntryPoint = "complete";
      state.trainView = "config";
      state.view = "train";
      await detectTrainHardware();
      await loadTrainDatasetInfo();
      render();
    }

    async function loadTrainDatasetInfo() {
      if (!state.trainDatasetDir) return;
      try {
        const dataset = await window.api.loadDataset(state.trainDatasetDir);
        if (!dataset.ok) return;
        state.trainDatasetPairs = dataset.totalPairs;
        state.trainDatasetFrames = dataset.totalFrames;

        const n = dataset.totalFrames || dataset.totalPairs || 0;
        if (!state.trainConfig.smallDatasetValidation) {
          applyDatasetDerivedStepDefaults(n);
        }
      } catch {}
    }

    async function detectTrainHardware() {
      state.trainDepStatus = "checking";
      try {
        const hw = await window.api.detectHardware();
        if (hw.ok) {
          state.trainPlatform = hw.platform;
          state.trainPreset = hw.preset;
          state.trainGpuInfo = Array.isArray(hw.gpu_info) ? hw.gpu_info.join(", ") : hw.gpu_info;
          state.trainConfig.preset = hw.preset;
          if (state.trainConfig.learning_rate == null || !Number.isFinite(state.trainConfig.learning_rate)) {
            state.trainConfig.learning_rate = presetDefaultLearningRate(hw.preset);
          }
          if (state.trainConfig.lora_rank == null) state.trainConfig.lora_rank = 64;
          if (state.trainConfig.lora_alpha == null) state.trainConfig.lora_alpha = 64;
          if (state.trainConfig.resolution == null) state.trainConfig.resolution = 512;
          state.trainDepStatus = "ok";
        } else {
          state.trainDepStatus = "error";
        }
      } catch {
        state.trainDepStatus = "error";
      }
    }

    async function installTrainingDeps() {
      state.trainDepStatus = "installing";
      state.trainLog = [];
      render();

      const result = await window.api.installTrainingDeps();

      if (result.ok) {
        // Re-detect hardware after install
        await detectTrainHardware();
      } else {
        state.trainDepStatus = "error";
      }
      render();
    }

    async function startTraining() {
      const preset = state.trainConfig.preset;
      if (!preset || !state.trainDatasetDir) return;

      // Build overrides from config
      const overrides = {};
      if (state.trainConfig.resolution) overrides.resolution = state.trainConfig.resolution;
      if (state.trainConfig.max_train_steps) overrides.max_train_steps = state.trainConfig.max_train_steps;
      {
        const lr = state.trainConfig.learning_rate;
        overrides.learning_rate = (lr != null && Number.isFinite(lr))
          ? lr
          : presetDefaultLearningRate(state.trainConfig.preset);
      }
      if (state.trainConfig.checkpointing_steps) overrides.checkpointing_steps = state.trainConfig.checkpointing_steps;
      if (state.trainConfig.validation_steps) overrides.validation_steps = state.trainConfig.validation_steps;
      if (state.trainConfig.train_batch_size) overrides.train_batch_size = state.trainConfig.train_batch_size;
      if (state.trainConfig.gradient_accumulation_steps) overrides.gradient_accumulation_steps = state.trainConfig.gradient_accumulation_steps;
      if (state.trainConfig.lr_scheduler) overrides.lr_scheduler = state.trainConfig.lr_scheduler;
      if (state.trainConfig.lr_warmup_steps != null && state.trainConfig.lr_warmup_steps !== "") {
        overrides.lr_warmup_steps = Number(state.trainConfig.lr_warmup_steps);
      }
      if (state.trainConfig.lora_rank != null) overrides.lora_rank = state.trainConfig.lora_rank;
      if (state.trainConfig.lora_alpha != null) overrides.lora_alpha = state.trainConfig.lora_alpha;

      // Prepare dataset first
      state.trainView = "preparing";
      state.trainLog = [];
      state.trainLossHistory = [];
      state.trainValidationImages = [];
      state.trainStatHistory = { loss: [], lr: [], speed: [] };
      state.trainPrevStatValues = {};
      state.trainValCompareIdx = [0, -1];
      render();

      const prepResult = await window.api.prepareTrainingDataset({
        datasetDir: state.trainDatasetDir,
      });

      if (!prepResult.ok) {
        alert("Dataset preparation failed: " + (prepResult.error || "Unknown error"));
        state.trainView = "config";
        render();
        return;
      }

      // Determine output dir
      if (!state.trainOutputDir) {
        const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
        state.trainOutputDir = state.trainDatasetDir + "/training_output/" + ts;
      }

      // Start training
      state.trainView = "training";
      render();

      const result = await window.api.startTraining({
        datasetDir: state.trainDatasetDir,
        preset: preset,
        overrides: overrides,
        outputDir: state.trainOutputDir,
      });

      if (result.ok) {
        state.trainProgressFile = result.progressFile;
        if (state.trainProgressFile) {
          // Delay first poll to give Python time to start and write initial progress
          setTimeout(() => {
            if (state.trainView === "training") {
              state.trainPollingInterval = setInterval(() => pollTrainingProgress(), 3000);
              pollTrainingProgress();
            }
          }, 2000);
        }
      } else {
        state.trainView = "config";
        state.trainLog.push({ ts: new Date(), type: "error", message: result.error || "Training failed to start" });
        state.trainLogVisible = true;
        render();
      }
    }

    async function pollTrainingProgress() {
      if (!state.trainProgressFile) return;
      const result = await window.api.getTrainingProgress(state.trainProgressFile);
      if (!result.ok) return;

      state.trainProgress = result;

      // Update loss history
      if (result.loss_history) {
        state.trainLossHistory = result.loss_history;
      }

      // Update validation images
      if (result.validation_images_loaded) {
        state.trainValidationImages = result.validation_images_loaded;
      }

      // Update stat history for sparklines (cap at 30)
      const sh = state.trainStatHistory;
      if (result.loss != null) { sh.loss.push(result.loss); if (sh.loss.length > 30) sh.loss.shift(); }
      if (result.learning_rate != null) { sh.lr.push(result.learning_rate); if (sh.lr.length > 30) sh.lr.shift(); }
      if (result.steps_per_second != null) { sh.speed.push(result.steps_per_second); if (sh.speed.length > 30) sh.speed.shift(); }

      // Check if done
      if (result.status === "complete" || result.status === "error" || result.status === "cancelled") {
        clearInterval(state.trainPollingInterval);
        state.trainPollingInterval = null;
        if (result.status === "complete") {
          state.trainView = "complete";
        } else {
          state.trainView = "config";
          const errMsg = result.error_message || `Training ${result.status}`;
          state.trainLog.push({ ts: new Date(), type: "error", message: errMsg });
          state.trainLogVisible = true;
        }
      }

      render();
    }

    async function cancelTraining() {
      clearInterval(state.trainPollingInterval);
      state.trainPollingInterval = null;
      await window.api.cancelTraining();
      state.trainView = "config";
      render();
    }

    // ── IPC Listeners ──

    window.api.onProcessLog((line) => {
      state.processLog.push(line);

      // Parse progress from log lines
      const fileMatch = line.match(/Processing: (.+)/);
      if (fileMatch) {
        state.processFile = fileMatch[1];
      }
      const indexMatch = line.match(/\[(\d+)\/(\d+)\]/);
      if (indexMatch) {
        state.processFileIndex = parseInt(indexMatch[1]) - 1;
      }

      render();
    });

    window.api.onProcessComplete(({ code, results }) => {
      state.processing = false;
      if (code === 0 && results) {
        state.results = results;
        state.view = "complete";
      } else {
        state.processLog.push(code === 0
          ? "Processing finished (no results file found)"
          : `Process exited with code ${code}`
        );
      }
      render();
    });

    // Training log listener
    window.api.onTrainingLog((line) => {
      const ts = new Date();
      let entry = { ts, type: "info", message: line };
      try {
        const parsed = JSON.parse(line);
        entry.type = parsed.type || "info";
        entry.message = parsed.message || line;
        if (parsed.type === "progress") {
          entry.message = `Step ${parsed.step}/${parsed.total} \u2502 loss=${parsed.loss} lr=${parsed.lr} (${parsed.pct}%)`;
        }
      } catch {
        if (typeof line === "string") {
          if (line.startsWith("[stderr]")) {
            entry.type = "stderr";
            entry.message = line.slice(9);
          } else if (/error|traceback|exception/i.test(line)) {
            entry.type = "error";
          } else if (/loading|downloading|fetching|shard|safetensor/i.test(line)) {
            entry.type = "loading";
          } else if (/^Map:|^Filter:|^Tokeniz|^Encod|^Preprocess|examples\/s/i.test(line)) {
            entry.type = "loading";
          }
        }
      }
      state.trainLog.push(entry);
      if (state.trainLog.length > 2000) state.trainLog = state.trainLog.slice(-2000);
    });

    window.api.onTrainingComplete(({ code }) => {
      clearInterval(state.trainPollingInterval);
      state.trainPollingInterval = null;
      if (code === 0) {
        state.trainView = "complete";
      } else {
        state.trainView = "config";
        state.trainLog.push({ ts: new Date(), type: "error", message: `Training process exited with code ${code}` });
        state.trainLogVisible = true;
      }
      render();
    });

    // ── Init ──
    checkDeps();
    render();
  </script>
</body>
</html>
